services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgis/postgis:16-3.4}
    environment:
      POSTGRES_USER: geoattend
      POSTGRES_PASSWORD: geoattend
      POSTGRES_DB: geoattend
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoattend"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes: ["redis_data:/data"]
volumes:
  postgres_data:
  redis_data:
